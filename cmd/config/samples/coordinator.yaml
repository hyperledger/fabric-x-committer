---
server:
  endpoint: :9001
  tls:
    # TLS configuration being built based on the tls mode chosen: none, tls, mtls.
    mode: mtls
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/peers/sidecar-peer-org-0/tls/server.crt
    key-path: /root/artifacts/peerOrganizations/peer-org-0/peers/sidecar-peer-org-0/tls/server.key
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0.com/tls/ca.crt
monitoring:
  endpoint: :2119
  tls:
    mode: mtls
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/peers/sidecar-peer-org-0/tls/server.crt
    key-path: /root/artifacts/peerOrganizations/peer-org-0/peers/sidecar-peer-org-0/tls/server.key
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0.com/tls/ca.crt
  # Rate limiting configuration for unary gRPC endpoints.
  # Uses a token bucket algorithm to limit the number of requests per second.
  rate-limit:
    # Maximum number of requests per second allowed.
    # Set to 0 to disable rate limiting.
    requests-per-second: 0
    # Maximum number of requests allowed in a single burst.
    # When rate limiting is enabled (requests-per-second > 0):
    #   - Must be greater than 0
    #   - Must be less than or equal to requests-per-second
    burst: 0

verifier:
  endpoints:
    - verifier:5001
  tls: &ClientTLS
    mode: mtls  # TLS configuration being built based on the tls mode chosen: none, tls, mtls.
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0.com/tls/client.crt
    key-path: /root/artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0.com/tls/client.key
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/peers/sidecar-peer-org-0/tls/ca.crt
validator-committer:
  endpoints:
    - vc:6001
  tls: *ClientTLS

dependency-graph:
  num-of-local-dep-constructors: 1
  waiting-txs-limit: 100_000
  per-channel-buffer-size-per-goroutine: 10

logging:
  logSpec: "info"
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}

