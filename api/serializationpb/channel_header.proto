syntax = "proto3";

option go_package = "github.com/hyperledger/fabric-x-committer/api/serializationpb";

package serializationpb;

// The messages below are projections of fabric's Envelope chain, containing
// only the fields the committer needs. Field numbers match the original proto
// definitions so that proto.Unmarshal correctly decodes the same wire bytes.
// Unused fields are treated as unknown fields and skipped by proto.Unmarshal.
//
// UnwrapEnvelopeLite uses these types to get correct proto semantics (recursive
// validation, duplicate message field merging) while avoiding the cost of
// allocating full fabric proto structs with all their unused fields.

// EnvelopeLiteProto is a projection of common.Envelope.
message EnvelopeLiteProto {
    bytes payload = 1;
}

// PayloadLite is a projection of common.Payload.
message PayloadLite {
    bytes header = 1;
    bytes data = 2;
}

// HeaderLite is a projection of common.Header.
message HeaderLite {
    bytes channel_header = 1;
}

// ChannelHeaderLite is a projection of common.ChannelHeader.
message ChannelHeaderLite {
    int32 type = 1;
    string tx_id = 5;
}
